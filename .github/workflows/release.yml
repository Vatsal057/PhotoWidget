name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Generate Xcode project
        run: |
          sudo gem install xcodeproj --no-document
          ruby scripts/gen_project.rb

      - name: Build (Release, unsigned)
        run: |
          xcodebuild -project PhotoWidget.xcodeproj -scheme PhotoWidget \
            -configuration Release -destination 'platform=macOS' \
            -derivedDataPath build CODE_SIGNING_ALLOWED=NO build \
            | grep -E "error:|BUILD (SUCCEEDED|FAILED)"

      # Runners have no Apple Development cert, so ad-hoc sign inside-out.
      # Note: the team-prefixed App Group entitlement is only implicitly
      # authorized under a real team signature — for a fully working widget,
      # replace this asset with a locally signed build (driver.sh dist).
      - name: Ad-hoc sign
        run: |
          APP=build/Build/Products/Release/PhotoWidget.app
          codesign --force --sign - \
            --entitlements PhotoWidgetExtension/PhotoWidgetExtension.entitlements \
            "$APP/Contents/PlugIns/PhotoWidgetExtension.appex"
          codesign --force --sign - \
            --entitlements PhotoWidget/PhotoWidget.entitlements "$APP"
          codesign --verify --deep --strict "$APP"

      - name: Package dmg
        run: |
          mkdir -p dist/stage
          cp -R build/Build/Products/Release/PhotoWidget.app dist/stage/
          ln -s /Applications dist/stage/Applications
          hdiutil create -volname PhotoWidget -srcfolder dist/stage -ov \
            -format UDZO dist/PhotoWidget.dmg
          rm -rf dist/stage

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/PhotoWidget.dmg --generate-notes
